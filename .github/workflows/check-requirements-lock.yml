name: Check Requirements Lock

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check-lock:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Verify requirements.txt is up to date
        run: make check-lock
